services:
  sonarqube:
    image: sonarqube:26.6.0.123539-community   # was :latest — pin for reproducible labs
    container_name: sonarqube
    depends_on:
      - db
    ports:
      - "9000:9000"   # Web UI
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  db:
    image: postgres:17                          # was :latest — pin a supported major
    container_name: sonarqube_db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      # FIX: original mounted /var/lib/postgresql which does NOT persist data on
      # the official postgres image. The data directory is /var/lib/postgresql/data.
      - postgresql:/var/lib/postgresql/data

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql:
